<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koupen Wakeup</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    background: #6fefdd;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
}

/* --- Start Screen Styles --- */
#startScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
}

#logo {
    display: flex;
    justify-content: center;
    align-items: center;
}

#startButton {
    cursor: pointer;
    user-select: none;
    image-rendering: pixelated;
    transition: transform 0.08s ease, filter 0.08s ease;
}

#startButton:hover {
    transform: scale(1.03);
}

#startButton.clicked {
    transform: scale(0.95);
    filter: brightness(1.5) drop-shadow(0 0 10px rgba(255,255,255,0.8));
}

/* --- Main Game Screen Styles --- */
#gameScreen {
    display: none; /* Hidden by default */
    width: 100%;
    height: 100%;
    background: #6fefdd;
    justify-content: center;
    align-items: center;
}

#gameBox {
    --border: 8px;
    --notch: 16px;

    position: relative;
    width: 95%;
    max-height: 90vh;
    aspect-ratio: 16 / 9;
}

#gameBox::before {
    content: "";
    position: absolute;
    inset: 0;
    background: #101312; /* border color */

    clip-path: polygon(
        var(--notch) 0,
        calc(100% - var(--notch)) 0,
        calc(100% - var(--notch)) var(--notch),
        100% var(--notch),
        100% calc(100% - var(--notch)),
        calc(100% - var(--notch)) calc(100% - var(--notch)),
        calc(100% - var(--notch)) 100%,
        var(--notch) 100%,
        var(--notch) calc(100% - var(--notch)),
        0 calc(100% - var(--notch)),
        0 var(--notch),
        var(--notch) var(--notch)
    );
}

#gameBox::after {
    content: "";
    position: absolute;
    inset: var(--border);
    background: #f6f9f6;

    clip-path: polygon(
        var(--notch) 0,
        calc(100% - var(--notch)) 0,
        calc(100% - var(--notch)) var(--notch),
        100% var(--notch),
        100% calc(100% - var(--notch)),
        calc(100% - var(--notch)) calc(100% - var(--notch)),
        calc(100% - var(--notch)) 100%,
        var(--notch) 100%,
        var(--notch) calc(100% - var(--notch)),
        0 calc(100% - var(--notch)),
        0 var(--notch),
        var(--notch) var(--notch)
    );
}

/* --- top-left corner PNG (scales with gameBox) --- */
.corner-png {
    position: absolute;
    top: calc(var(--border) + 6px);
    left: calc(var(--border) + 16px);
    width: 35%;          /* scales linearly with #gameBox width */
    max-width: 690px;
    height: auto;
    z-index: 10;
    pointer-events: none;
}

/* --- Wrapper for grouped animations --- */
#animationWrapper {
    position: absolute;
    top: 65%;
    left: 50%;
    transform: translate(-50%, -50%);

    /* Explicitly lock the wrapper's height relative to the gameBox */
    height: 75%;
    width: auto; /* Let the width expand naturally based on the children */

    display: flex;
    justify-content: center;
    align-items: center;

    /* This gap will now measure exactly between the visual edges of the PNGs */
    gap: 0px;
    z-index: 20;
    pointer-events: none;
}

/* --- Shared styles for centered gameplay graphics --- */
.center-animation, .left-animation {
    /* Force height tracking exclusively */
    height: 75%;
    width: auto;

    /* Prevent any flexbox squeezing or stretching */
    flex-shrink: 0;
    flex-grow: 0;

    image-rendering: crisp-edges;
    image-rendering: pixelated;

    pointer-events: auto;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="startScreen">
    <div id="logo">
        <img
            id="logo-img"
            src="logo.png"
            alt="Main Logo"
        >
    </div>

    <img
        id="startButton"
        src="frame01.png"
        alt="Start Button"
    >
</div>

<div id="gameScreen">
    <div id="gameBox">
        <img class="corner-png" src="corner.png" alt="corner emblem">
        
        <div id="animationWrapper">
            <img class="left-animation" id="leftAnim" src="clock0.png" alt="left animation">
            <img class="center-animation" id="centerAnim" src="anim01.png" alt="center animation">
        </div>
        
    </div>
</div>

<audio id="startSound" preload="auto">
    <source src="start.ogg" type="audio/ogg">
</audio>

<audio id="bgMusic" preload="auto" loop>
    <source src="music.ogg" type="audio/ogg">
</audio>

<audio id="gameSfx" preload="auto" loop>
    <source src="alarm.ogg" type="audio/ogg">
</audio>

<audio id="winSound" preload="auto">
    <source src="win.ogg" type="audio/ogg">
</audio>

<script>
// --- Asset Preloading ---
const imagesToPreload = [
    "frame01.png", "frame02.png",
    "base01.png", "base02.png", "base03.png",
    "clock0.png", "clock1.png", "clock2.png",
    "prog_0.png", "prog_1.png", "prog_2.png",
    "win01.png", "win02.png", "win03.png"
];

imagesToPreload.forEach(src => {
    const img = new Image();
    img.src = src;
});

// --- Existing Game State Variables & References Continue Below ---
const startScreen = document.getElementById("startScreen");

const startScreen = document.getElementById("startScreen");
const gameScreen = document.getElementById("gameScreen");
const startButton = document.getElementById("startButton");
const startSound = document.getElementById("startSound");

// --- Game State Variables ---
let gameState = "idle"; // 'idle', 'active', or 'won'
let score = 0;
const maxScore = 100;
const clickPower = 8;
let centerIdleInterval;
let leftActiveInterval; // Track active loop to safely clear it on win

/* 2-frame idle animation for start button */
const frames = ["frame01.png", "frame02.png"];
let frameIndex = 0;
setInterval(() => {
    frameIndex = (frameIndex + 1) % frames.length;
    startButton.src = frames[frameIndex];
}, 500);

/* Click effect and transition to game screen */
startButton.addEventListener("click", () => {
    startButton.classList.add("clicked");

    startSound.currentTime = 0;
    startSound.play().catch(() => {});

    setTimeout(() => {
        startButton.classList.remove("clicked");

        startScreen.style.display = "none";
        gameScreen.style.display = "flex";

        // Start the background music loop
        const bgMusic = document.getElementById("bgMusic");
        if (bgMusic) {
            bgMusic.currentTime = 0;
            bgMusic.play().catch((error) => console.log("Music failed:", error));
        }

        // Initialize the gameplay setup ONLY after transition completes
        initializeGameplay();

        console.log("START GAME");
    }, 750);
});

/* Initialize Gameplay Elements */
function initializeGameplay() {
    const leftAnim = document.getElementById("leftAnim");
    const centerAnim = document.getElementById("centerAnim");
    const gameSfx = document.getElementById("gameSfx");

    // Start center idle animation
    const centerIdleFrames = ["base01.png", "base02.png", "base03.png"];
    let centerFrameIndex = 0;

    centerIdleInterval = setInterval(() => {
        centerFrameIndex = (centerFrameIndex + 1) % centerIdleFrames.length;
        centerAnim.src = centerIdleFrames[centerFrameIndex];
    }, 200);

    // Setup Click Listeners
    centerAnim.addEventListener("click", () => {
        if (gameState === "idle") {
            activateGame(leftAnim, centerAnim, gameSfx);
        }

        if (gameState === "active") {
            score += clickPower;
            if (score >= maxScore) {
                score = maxScore;
                triggerWinState(leftAnim, centerAnim, gameSfx);
            }
            updateCenterVisuals(centerAnim);
        }
    });

    leftAnim.addEventListener("click", () => {
        if (gameState === "idle") {
            activateGame(leftAnim, centerAnim, gameSfx);
        }
    });
}

// Activate Main Clicking Phase
function activateGame(leftAnim, centerAnim, gameSfx) {
    if (gameState !== "idle") return;
    gameState = "active";

    clearInterval(centerIdleInterval);

    // Play the gameplay loop sound effect
    if (gameSfx) {
        gameSfx.currentTime = 0;
        gameSfx.play().catch(() => {});
    }

    // Start Left Animation Loop (2 frames)
    const leftActiveFrames = ["clock1.png", "clock2.png"];
    let leftFrameIndex = 0;
    leftActiveInterval = setInterval(() => {
        leftFrameIndex = (leftFrameIndex + 1) % leftActiveFrames.length;
        leftAnim.src = leftActiveFrames[leftFrameIndex];
    }, 80);

    // Start the physics/decay loop
    startGameLoop(centerAnim);
    updateCenterVisuals(centerAnim);
}

// The Decay Loop
function startGameLoop(centerAnim) {
    setInterval(() => {
        if (gameState === "active" && score > 0) {
            let currentDecayRate = 0.9 + (score * 0.025);
            score -= currentDecayRate;

            if (score <= 0) score = 0;
            updateCenterVisuals(centerAnim);
        }
    }, 50);
}

// Visual Updater
function updateCenterVisuals(centerAnim) {
    if (gameState !== "active") return;

    let percentage = (score / maxScore) * 100;

    if (percentage === 0) {
        centerAnim.src = "prog_0.png";
    } else if (percentage <= 50) {
        centerAnim.src = "prog_1.png";
    } else if (percentage < 100) {
        centerAnim.src = "prog_2.png";
    }
}

// Win Condition Trigger
function triggerWinState(leftAnim, centerAnim, gameSfx) {
    gameState = "won";
    console.log("Erai!");
    
    // 1. Stop active looping animation intervals
    clearInterval(leftActiveInterval);
    
    // 2. Clear out ongoing audio tracks
    const bgMusic = document.getElementById("bgMusic");
    if (bgMusic) bgMusic.pause();
    if (gameSfx) gameSfx.pause();
    
    // 3. Fire off the win sound effect once
    const winSound = document.getElementById("winSound");
    if (winSound) {
        winSound.currentTime = 0;
        winSound.play().catch((e) => console.log("Win sound failed:", e));
    }

    // 4. Hide left graphic completely to let the center element align perfectly
    leftAnim.style.display = "none";

    // 5. Run a 3-frame variable delay win animation sequence
    const delayFrame1To2 = 1000; // Time frame 1 stays up (in ms)
    const delayFrame2To3 = 850; // Time frame 2 stays up (in ms)

    centerAnim.src = "win01.png"; // Instantly show first frame

    setTimeout(() => {
        centerAnim.src = "win02.png"; // Transition to second frame

        setTimeout(() => {
            centerAnim.src = "win03.png"; // Final frame (freezes here)
        }, delayFrame2To3);

    }, delayFrame1To2);
}
</script>

</body>
</html>
